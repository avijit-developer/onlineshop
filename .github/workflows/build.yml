name: Auto Build & Deploy Fullstack

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get code
        uses: actions/checkout@v3

      # ---------- BACKEND ----------
      - name: Install backend
        run: |
          cd backend
          npm install

      # ---------- ADMIN FRONTEND ----------
      - name: Build admin
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_SOCKET_URL: ${{ secrets.REACT_APP_SOCKET_URL }}
        run: |
          cd admin
          npm install
          CI=false npm run build

      # ---------- ESHOP APP ----------
      - name: Install eshop app
        run: |
          cd Eshopapp
          npm install

      # ---------- DEPLOY ADMIN TO SERVER ----------
      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "admin/build/*"
          target: "/home/ubuntu/admin_build"
