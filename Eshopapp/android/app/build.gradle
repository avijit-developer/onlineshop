apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

// Move vector icons apply after react plugin
apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"

/**
 * React Native configuration block
 */
react {
    autolinkLibrariesWithApp()
}

/**
 * Run Proguard on Release builds to minify Java bytecode
 */
def enableProguardInReleaseBuilds = false

/**
 * JavaScriptCore configuration
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.trahimart"

    defaultConfig {
        applicationId "com.trahimart"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 22
        versionName "1.0"

        ndk {
            abiFilters "arm64-v8a", "x86_64"
        }
        resConfigs "en"
    }

    /**
     * 🔐 Signing configurations
     * Release uses keystore values defined in gradle.properties
     */
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }

        release {
            if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                storeFile file(MYAPP_UPLOAD_STORE_FILE)
                storePassword MYAPP_UPLOAD_STORE_PASSWORD
                keyAlias MYAPP_UPLOAD_KEY_ALIAS
                keyPassword MYAPP_UPLOAD_KEY_PASSWORD
            }
        }
    }

    /**
     * Build types
     */
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }

        release {
            signingConfig signingConfigs.release
            shrinkResources true
            minifyEnabled true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    /**
     * Optional: Configure splits to optimize builds
     */
    // splits {
    //     abi {
    //         enable true
    //         reset()
    //         include "arm64-v8a", "x86_64"
    //         universalApk false
    //     }
    //     density {
    //         enable false
    //     }
    // }

    tasks.whenTaskAdded { task ->
        // Update to include both tasks
        if (task.name == "generateReleaseLintVitalReportModel" || 
            task.name == "lintVitalAnalyzeRelease") {
            task.dependsOn(":app:copyReactNativeVectorIconFonts")
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

project.afterEvaluate {
    // Add configuration for both tasks
    tasks.named("generateReleaseLintVitalReportModel") {
        inputs.files(tasks.named("copyReactNativeVectorIconFonts"))
    }
    
    tasks.named("lintVitalAnalyzeRelease") {
        inputs.files(tasks.named("copyReactNativeVectorIconFonts"))
    }
}
